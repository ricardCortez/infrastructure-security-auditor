[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    integration: Integration tests (require running API at localhost:8000)
    network: Network connectivity tests
    slow: Slow running tests
    unit: Pure unit tests (no external dependencies)

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: pip install flake8 black isort
      - name: Lint auditor
        run: flake8 src/ tests/ --max-line-length=120
      - name: Lint backend
        run: flake8 backend/ --max-line-length=120 --exclude=backend/core-api/tests
      - name: Check formatting
        run: black --check src/ tests/ backend/cli/

  test-auditor:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pytest-timeout
      - name: Run auditor tests
        run: pytest tests/ -v --cov=src --cov-report=xml --timeout=60
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run core-api tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psi_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest backend/core-api/tests/ -v --cov=app --cov-report=xml
      - name: Run CLI tests
        run: pytest backend/cli/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: [test-auditor, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t psi-api:${{ github.sha }} -f backend/core-api/Dockerfile backend/core-api/
      - name: Build Worker image
        run: docker build -t psi-worker:${{ github.sha }} -f backend/job-orchestrator/Dockerfile backend/job-orchestrator/
